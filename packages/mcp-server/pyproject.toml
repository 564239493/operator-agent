[project]
name = "operator-agent-mcp-server"
version = "0.1.0"
description = "MCP Server subsystem for operator-agent (DB + document parsing)"
requires-python = ">=3.12"
dependencies = [
    "operator-agent-shared",
    "mcp>=1.0",
    "aiosqlite>=0.20",
    "pydantic>=2.0",
    "markdown-it-py[plugins]>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_server"]
